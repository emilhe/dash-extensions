name: Upload Python Package

on:
  release:
    types: [created]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for npm trusted publishing (OIDC)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org/

      # Ensure npm is new enough for trusted publishing behavior
      - name: Upgrade npm
        run: |
          node --version
          npm --version
          npm i -g npm@latest
          npm --version

      # Guardrail: remove any token-based config that could interfere
      - name: Remove npm token config
        shell: bash
        run: |
          rm -f ~/.npmrc .npmrc || true

      - name: Build (JS)
        run: |
          npm ci
          npm run build

      - name: Publish to npm (Trusted Publishing / OIDC)
        run: |
          npm publish --provenance

      - name: Install uv (with cache)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Build and publish to PyPI
        run: |
          uv build
          uv publish --username=${{ secrets.PYPI_USERNAME }} --password=${{ secrets.PYPI_PASSWORD }}
